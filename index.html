<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЭКСТРА — Кто первый?</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #0a0e1a 0%, #1a2332 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    color: #c0c8d0;
  }
  .container { max-width: 500px; width: 100%; text-align: center; }
  .badge {
    display: inline-block;
    padding: 6px 20px;
    background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
    border: 1px solid #ffd700;
    border-radius: 30px;
    color: #ffd700;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .title {
    font-family: 'Oswald', sans-serif;
    font-size: 48px;
    font-weight: 700;
    background: linear-gradient(180deg, #ffd700 0%, #b8941f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .subtitle { font-size: 16px; color: #8a95a3; letter-spacing: 2px; margin-bottom: 40px; }
  .name-input {
    width: 100%;
    padding: 18px 25px;
    background: rgba(26, 35, 50, 0.8);
    border: 2px solid #4a5568;
    border-radius: 8px;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 18px;
    text-align: center;
    margin-bottom: 25px;
  }
  .name-input:focus { outline: none; border-color: #ffd700; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
  .name-input:disabled { opacity: 0.5; }
  .answer-btn {
    width: 100%;
    padding: 30px;
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #000;
    background: linear-gradient(135deg, #ffd700 0%, #b8941f 100%);
    border: 3px solid #ffd700;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
    transition: all 0.2s;
  }
  .answer-btn:active:not(:disabled) { transform: scale(0.97); }
  .answer-btn:disabled {
    background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
    border-color: #4a5568;
    color: #8a95a3;
    cursor: not-allowed;
    box-shadow: none;
  }
  .status {
    margin-top: 30px;
    padding: 20px;
    background: rgba(26, 35, 50, 0.6);
    border: 1px solid #4a5568;
    border-radius: 8px;
    font-size: 16px;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
  }
  .status.success { border-color: #52b788; color: #52b788; }
  .status.error { border-color: #e63946; color: #e63946; }
  .status.waiting { border-color: #4a9eff; color: #6eb5ff; }
  .loader {
    width: 20px; height: 20px;
    border: 3px solid rgba(255, 215, 0, 0.3);
    border-radius: 50%;
    border-top-color: #ffd700;
    animation: spin 1s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .position-badge {
    display: inline-block;
    padding: 8px 20px;
    background: linear-gradient(135deg, #52b788 0%, #40916c 100%);
    border-radius: 20px;
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    margin-top: 5px;
  }
  .hint { margin-top: 30px; font-size: 13px; color: #6a7585; font-style: italic; line-height: 1.5; }
</style>
</head>
<body>

<div class="container">
  <div class="badge">⭐ Бонусный раунд</div>
  <h1 class="title">ЭКСТРА</h1>
  <p class="subtitle">Кто первый нажмёт — тот отвечает!</p>
  
  <input type="text" class="name-input" id="playerName" placeholder="Введите ваше ФИО" maxlength="50" autocomplete="off">
  
  <button class="answer-btn" id="answerBtn" onclick="pressAnswer()">🎯 Ответить</button>
  
  <div class="status" id="status">Проверка подключения...</div>
  
  <p class="hint">💡 Нажимайте кнопку только когда будете готовы отвечать.<br>Ведущий увидит порядок нажатий и вызовет первого.</p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// ============ КОНФИГ FIREBASE ============
const firebaseConfig = {
  apiKey: "AIzaSyBsu2Rj8HRw83SEO0zG_7Ev_-jBHJYm-Bs",
  authDomain: "moscow-city-game1.firebaseapp.com",
  databaseURL: "https://moscow-city-game1-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "moscow-city-game1",
  storageBucket: "moscow-city-game1.firebasestorage.app",
  messagingSenderId: "959754941375",
  appId: "1:959754941375:web:b3010b388c18d4938c670a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isPressed = false;
let roundActive = false;
let myPosition = null;

const nameInput = document.getElementById('playerName');
const answerBtn = document.getElementById('answerBtn');
const statusEl = document.getElementById('status');

const savedName = localStorage.getItem('playerName');
if (savedName) nameInput.value = savedName;
nameInput.addEventListener('input', () => localStorage.setItem('playerName', nameInput.value));

// Слушаем состояние раунда в реальном времени
db.ref('extraRound').on('value', (snapshot) => {
  const data = snapshot.val() || {};
  roundActive = data.active === true;
  const players = data.players || {};
  
  // Проверяем, не нажали ли мы уже (если страница перезагрузилась)
  const savedName = localStorage.getItem('playerName');
  if (savedName) {
    for (const key in players) {
      if (players[key].name.toLowerCase() === savedName.toLowerCase()) {
        myPosition = players[key].position;
        isPressed = true;
        answerBtn.disabled = true;
        nameInput.disabled = true;
        statusEl.className = 'status success';
        statusEl.innerHTML = `✅ Вы уже нажали! Ваша позиция:<div class="position-badge">#${myPosition}</div>`;
        return;
      }
    }
  }
  
  // Обновляем статус
  if (!roundActive && !isPressed) {
    statusEl.className = 'status waiting';
    statusEl.innerHTML = '⏳ Ожидание нового вопроса...<br><span style="font-size:13px">Попросите ведущего нажать "Начать приём"</span>';
    answerBtn.disabled = true;
  } else if (roundActive && !isPressed) {
    statusEl.className = 'status';
    statusEl.innerHTML = 'Введите имя и нажмите кнопку';
    answerBtn.disabled = false;
    nameInput.disabled = false;
  }
});

async function pressAnswer() {
  const playerName = nameInput.value.trim();
  
  if (!playerName) {
    statusEl.className = 'status error';
    statusEl.innerHTML = '❌ Введите ваше ФИО!';
    nameInput.focus();
    return;
  }
  
  if (!roundActive) {
    statusEl.className = 'status error';
    statusEl.innerHTML = '⏳ Раунд ещё не начался.<br>Попросите ведущего нажать "Начать приём"';
    return;
  }
  
  if (isPressed) return;
  
  isPressed = true;
  answerBtn.disabled = true;
  nameInput.disabled = true;
  statusEl.className = 'status waiting';
  statusEl.innerHTML = '<div class="loader"></div> Отправка...';
  
  try {
    // Получаем текущих игроков
    const snapshot = await db.ref('extraRound/players').once('value');
    const players = snapshot.val() || {};
    
    // Проверяем, не нажимал ли кто-то с таким же именем
    for (const key in players) {
      if (players[key].name.toLowerCase() === playerName.toLowerCase()) {
        statusEl.className = 'status error';
        statusEl.innerHTML = '⚠️ Кто-то с таким именем уже нажал!<br>Введите полное ФИО.';
        isPressed = false;
        answerBtn.disabled = false;
        nameInput.disabled = false;
        return;
      }
    }
    
    // Определяем позицию
    const position = Object.keys(players).length + 1;
    
    // Записываем в базу
    const newRef = db.ref('extraRound/players').push();
    await newRef.set({
      name: playerName,
      time: firebase.database.ServerValue.TIMESTAMP,
      position: position
    });
    
    myPosition = position;
    statusEl.className = 'status success';
    statusEl.innerHTML = `✅ Вы ${getPositionText(position)}! Ждите вызова.<div class="position-badge">#${position}</div>`;
    
  } catch (error) {
    console.error(error);
    statusEl.className = 'status error';
    statusEl.innerHTML = `❌ Ошибка: ${error.message}`;
    isPressed = false;
    answerBtn.disabled = false;
    nameInput.disabled = false;
  }
}

function getPositionText(pos) {
  if (pos === 1) return 'первый';
  if (pos === 2) return 'второй';
  if (pos === 3) return 'третий';
  return `${pos}-й`;
}
</script>

</body>
</html>
